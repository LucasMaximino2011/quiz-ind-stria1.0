<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz: Primeira Revolução Industrial</title>
<style>
    body { 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        background-color: #f4f7f6; 
        color: #333;
        display: flex; 
        justify-content: center; 
        align-items: center; 
        height: 100vh; 
        margin: 0; 
    }
   .quiz-container { 
        background: #ffffff; 
        padding: 30px; 
        border-radius: 12px; 
        box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        max-width: 600px; 
        width: 90%; 
    }
    h2 {
        text-align: center;
        color: #2c3e50;
        margin-top: 0;
    }
   .question { 
        font-size: 1.2em; 
        font-weight: bold;
        margin-bottom: 20px; 
        color: #34495e;
    }
   .options { 
        display: flex; 
        flex-direction: column; 
        gap: 12px; 
    }
    button { 
        padding: 12px; 
        border: 2px solid #e0e0e0; 
        border-radius: 8px; 
        cursor: pointer; 
        background: #fdfdfd; 
        font-size: 1em; 
        text-align: left;
        transition: all 0.3s ease; 
    }
    button:hover:not(:disabled) { 
        background: #eaf2f8; 
        border-color: #3498db;
    }
    button:disabled {
        cursor: not-allowed;
    }
    button.correct { 
        background: #d5f5e3; 
        color: #1d8348; 
        border-color: #2ecc71; 
    }
    button.wrong { 
        background: #fadbd8; 
        color: #943126; 
        border-color: #e74c3c; 
    }
    #next-btn { 
        margin-top: 25px; 
        background: #3498db; 
        color: white; 
        border: none; 
        display: none; 
        text-align: center;
        font-weight: bold;
        width: 100%;
    }
    #next-btn:hover { 
        background: #2980b9; 
    }
    #result { 
        margin-top: 20px; 
        font-weight: bold; 
        text-align: center; 
        font-size: 1.4em; 
        color: #2c3e50;
    }
</style>
</head>
<body>

<div class="quiz-container">
    <h2>Quiz: Primeira Revolução Industrial</h2>
    <div id="question-container">
        <div class="question" id="question-text">Pergunta vai aqui</div>
        <div class="options" id="options-container"></div>
    </div>
    <button id="next-btn" onclick="nextQuestion()">Próxima Pergunta</button>
    <div id="result"></div>
</div>

<script>
    const questions =,
            answer: 2
        },
        {
            question: "2. O que o termo 'Pausa de Engels' (Engels' Pause) descreve sobre esse período?",
            options:,
            answer: 0
        },
        {
            question: "3. Quem inventou a máquina de fiar movida a água (water frame) e foi responsável por fundar o moderno sistema de fábricas?",
            options:,
            answer: 1
        },
        {
            question: "4. O Movimento Ludista destacou-se por qual tipo de ação?",
            options:,
            answer: 3
        },
        {
            question: "5. Como a industrialização e o modelo fabril chegaram pioneiramente à Bélgica no início do século XIX?",
            options:,
            answer: 1
        },
        {
            question: "6. Qual invenção de Humphry Davy (1815) reduziu as explosões de gás metano (grisu) nas minas de carvão?",
            options:,
            answer: 0
        }
    ];

    let currentQuestion = 0;
    let score = 0;

    function loadQuestion() {
        const q = questions[currentQuestion];
        document.getElementById('question-text').innerText = q.question;
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';
        
        q.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.onclick = () => selectAnswer(index, btn);
            optionsContainer.appendChild(btn);
        });
        document.getElementById('next-btn').style.display = 'none';
    }

    function selectAnswer(selectedIndex, btn) {
        const correctIndex = questions[currentQuestion].answer;
        const buttons = document.querySelectorAll('.options button');
        
        // Desabilita todos os botões após a escolha
        buttons.forEach(b => b.disabled = true);
        
        if (selectedIndex === correctIndex) {
            btn.classList.add('correct');
            score++;
        } else {
            btn.classList.add('wrong');
            buttons[correctIndex].classList.add('correct'); // Mostra a resposta certa
        }
        
        document.getElementById('next-btn').style.display = 'block';
    }

    function nextQuestion() {
        currentQuestion++;
        if (currentQuestion < questions.length) {
            loadQuestion();
        } else {
            showResult();
        }
    }

    function showResult() {
        document.getElementById('question-container').style.display = 'none';
        document.getElementById('next-btn').style.display = 'none';
        
        let message = "";
        if(score === questions.length) {
            message = "Excelente! Você é um especialista na Indústria 1.0!";
        } else if (score >= 3) {
            message = "Muito bom! Você tem um ótimo conhecimento sobre o tema.";
        } else {
            message = "Continue estudando! A Primeira Revolução Industrial tem muitos detalhes fascinantes.";
        }

        document.getElementById('result').innerHTML = `Você acertou ${score} de ${questions.length} perguntas!<br><br><span style="font-size: 0.8em; color: #555;">${message}</span>`;
    }

    // Inicia o Quiz
    loadQuestion();
</script>

</body>
  </html>
